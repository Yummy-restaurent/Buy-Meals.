<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="rating.css">
    <title>Rate Page</title>
</head>

<body>

    <!-- loader -->

    <div class="loader">

        <div></div>

        <p>Sending...</p>

    </div>

    <!-- Navbar -->
    <nav>

        <!-- logo -->

        <div class="logo">
            <img src="images/Yummy-logo.png" alt="Yummy logo">
        </div>

        <!-- navigation -->

        <ul class="navigation links">

            <li><a href="index.html" title="Go To Home">Home</a></li>
            <li><a href="menu.html" title="Go To Menu">Menu</a></li>
            <li><a href="reserve.html" title="Go To Reservation">Reservation</a></li>
            <li><a href="contact.html" title="Go To Contact">Contact</a></li>


        </ul>

        <!-- star logo -->

        <div class="rate">
            <a href="rate.html"><img src="images/star-logo.png " alt="star-rate"></a>

        </div>

    </nav>

    <!-- Rating -->

    <div class="rate-container">

        <div class="rating-card">

            <h1>4.8</h1>

            <div class="stars">★★★★★</div>

            <p class="reviews-count">1,837 reviews</p>

            <!-- Avreges -->

            <div class="rating-bars">

                <div class="row">
                    <span>5⭐</span>
                    <div class="bar">
                        <div class="avr avr5"></div>
                    </div>
                    <span>76%</span>
                </div>

                <div class="row">
                    <span>4⭐</span>
                    <div class="bar">
                        <div class="avr avr4"></div>
                    </div>
                    <span>14%</span>
                </div>

                <div class="row">
                    <span>3⭐</span>
                    <div class="bar">
                        <div class="avr avr3"></div>
                    </div>
                    <span>6%</span>
                </div>

                <div class="row">
                    <span>2⭐</span>
                    <div class="bar">
                        <div class="avr avr2"></div>
                    </div>
                    <span>3%</span>
                </div>

                <div class="row">
                    <span>1⭐</span>
                    <div class="bar">
                        <div class="avr avr1"></div>
                    </div>
                    <span>1%</span>
                </div>

                <label>Rating</label>

                <div class="star-rating">
                    <input type="radio" id="s5" name="rate"><label for="s5">★</label>
                    <input type="radio" id="s4" name="rate"><label for="s4">★</label>
                    <input type="radio" id="s3" name="rate"><label for="s3">★</label>
                    <input type="radio" id="s2" name="rate"><label for="s2">★</label>
                    <input type="radio" id="s1" name="rate"><label for="s1">★</label>
                </div>

            </div>

        </div>


        <!-- Review -->

        <div class="card">
            <h2>Add Your Review</h2>

            <form>

                <label>Your Name</label>
                <input type="text" placeholder="Enter your name" required>

                <label>Your Review</label>
                <textarea rows="5" placeholder="Write your opinion..." required></textarea>

                <button type="submit"><a href="rating.html">Submit</a></button>

            </form>
        </div>

    </div>

    <footer>© 2026 All Rights Reserved - Mohamed Salah</footer>


</body>

</html>

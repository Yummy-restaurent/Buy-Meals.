<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="order-steak.css">

    <title>Buy Steak</title>
</head>

<body>

    <!-- loader -->

    <div class="loader">

        <div></div>

        <p>Placing your order...</p>

    </div>

    <!-- Navbar -->
    <nav>

        <!-- logo -->

        <div class="logo">
            <img src="images/Yummy-logo.png" alt="Yummy logo">
        </div>

        <!-- navigation -->

        <ul class="navigation links">

            <li><a href="index.html" title="Go To Home">Home</a></li>
            <li><a href="menu.html" title="Go To Menu">Menu</a></li>
            <li><a href="reserve.html" title="Go To Reservation">Reservation</a></li>
            <li><a href="contact.html" title="Go To Contact">Contact</a></li>


        </ul>

        <!-- star logo -->

        <div class="rate">
            <a href="rate.html" title="Go To Rate"><img src=" images/star-logo.png " alt="star-rate "></a>
        </div>

    </nav>

    <div class="order">

        <h2>Order Checkout</h2>

        <div class="food-card">
            <img src="images/steak.jfif " alt="steak🥩">
            <h3>Steak🥩</h3>
        </div>

        <form>

            <input type="text" placeholder="Your Name " required>

            <input type="tel" placeholder="Phone Number" required>

            <input type="text" placeholder="Your Address" required>

            <select>
                <option>Steak Doneness</option>
                <option>Rare 15$</option>
                <option>Medium 15$</option>
                <option>Well Done 15$</option>
            </select>

            <button><a href="order-steak.html">Done</a></button>

        </form>

    </div>


</body>

</html>
